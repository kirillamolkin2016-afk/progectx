<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Доска бригад · Hide-X</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#E9EDF1;
    --surface:#FFFFFF;
    --ink:#14181F;
    --muted:#5C6772;
    --faint:#8A949E;
    --line:#E4E9EE;
    --line2:#CFD7DF;
    --chrome:#1C2530;
    --chrome-ink:#FFFFFF;
    --today:#E11D48;
    --weekend:#F2F5F8;
    --ok:#15803D;
    --plan:#B45309;
    --radius:14px;
    --shadow:0 1px 2px rgba(16,24,40,.05),0 10px 30px rgba(16,24,40,.07);
    --dw:32px;
    --label-w:178px;
    --row-unit:40px;
    --font:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --mono:"JetBrains Mono",ui-monospace,"SF Mono",Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:var(--font);
    color:var(--ink);
    background:var(--bg);
    -webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;
  }
  .app{max-width:1320px;margin:0 auto;padding:18px 18px 120px;}

  /* ---------- Top bar ---------- */
  .topbar{display:flex;align-items:center;gap:14px;margin-bottom:14px;}
  .logo{
    width:46px;height:46px;border-radius:12px;flex:0 0 auto;
    background:var(--chrome);color:var(--chrome-ink);
    display:flex;align-items:center;justify-content:center;
    font-weight:800;letter-spacing:.5px;font-size:17px;
    box-shadow:var(--shadow);
  }
  .title{font-size:21px;font-weight:800;line-height:1.05;letter-spacing:-.02em;}
  .sub{font-size:12.5px;color:var(--muted);margin-top:3px;}

  /* ---------- Toolbar ---------- */
  .toolbar{
    display:flex;flex-wrap:wrap;align-items:center;gap:10px;
    margin-bottom:10px;
  }
  .stats{display:flex;gap:8px;flex-wrap:wrap;}
  .chip{
    display:inline-flex;align-items:center;gap:7px;
    background:var(--surface);border:1px solid var(--line);
    padding:7px 11px;border-radius:999px;font-size:12.5px;font-weight:600;
    box-shadow:0 1px 1px rgba(16,24,40,.03);
  }
  .chip b{font-family:var(--mono);font-size:13px;font-weight:700;}
  .chip .d{width:8px;height:8px;border-radius:50%;}
  .spacer{flex:1 1 auto;}
  .seg{display:inline-flex;background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:3px;gap:2px;box-shadow:0 1px 1px rgba(16,24,40,.03);}
  .seg button{
    border:0;background:transparent;color:var(--muted);
    font:inherit;font-size:13px;font-weight:600;padding:7px 13px;border-radius:8px;cursor:pointer;
  }
  .seg button.on{background:var(--chrome);color:var(--chrome-ink);}
  .tools{display:flex;gap:8px;align-items:center;}
  .btn{
    border:1px solid var(--line2);background:var(--surface);color:var(--ink);
    font:inherit;font-size:13px;font-weight:600;padding:8px 13px;border-radius:10px;cursor:pointer;
    display:inline-flex;align-items:center;gap:7px;transition:border-color .12s,transform .04s;
  }
  .btn:hover{border-color:#aeb8c2;}
  .btn:active{transform:translateY(1px);}
  .btn--primary{background:var(--chrome);border-color:var(--chrome);color:var(--chrome-ink);}
  .btn--primary:hover{background:#27313e;border-color:#27313e;}
  .btn--danger{color:#B91C1C;border-color:#f0c4c4;background:#fff;}
  .btn--danger:hover{border-color:#e29a9a;}
  .btn--ghost{border-color:transparent;background:transparent;}
  .icon{font-size:15px;line-height:1;}

  .legend{
    display:flex;flex-wrap:wrap;gap:14px;align-items:center;
    font-size:12px;color:var(--muted);margin:2px 2px 12px;
  }
  .legend .it{display:inline-flex;align-items:center;gap:7px;}
  .sw{width:24px;height:13px;border-radius:4px;display:inline-block;}
  .sw--active{background:#5C6772;}
  .sw--plan{border:1.5px dashed #5C6772;background:
      repeating-linear-gradient(45deg,rgba(92,103,114,.16) 0 6px,transparent 6px 12px);}
  .sw--done{background:#E5E9ED;border:1px solid #D3D9DF;}

  /* ---------- Board ---------- */
  .board{
    background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
    box-shadow:var(--shadow);overflow:auto;max-height:calc(100vh - 250px);
    position:relative;
    -webkit-overflow-scrolling:touch;
  }
  .brow{display:flex;align-items:stretch;width:max-content;border-bottom:1px solid var(--line);}
  .brow:last-child{border-bottom:0;}
  .head{position:sticky;top:0;z-index:20;background:var(--surface);border-bottom:1px solid var(--line2);}
  .corner{
    position:sticky;left:0;z-index:30;flex:0 0 var(--label-w);width:var(--label-w);
    background:var(--surface);border-right:1px solid var(--line2);
    display:flex;align-items:flex-end;padding:8px 14px;
    font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--faint);
  }
  .thead{position:relative;}
  .months{display:flex;height:24px;border-bottom:1px solid var(--line);}
  .mcell{
    flex:0 0 auto;font-size:11px;font-weight:700;color:var(--ink);
    letter-spacing:.01em;padding:5px 0 0 8px;border-left:1px solid var(--line);
    white-space:nowrap;overflow:hidden;
  }
  .mcell:first-child{border-left:0;}
  .days{display:flex;height:34px;}
  .dcell{
    flex:0 0 auto;display:flex;flex-direction:column;align-items:center;justify-content:center;
    border-left:1px solid var(--line);gap:0;
  }
  .dcell.we{background:var(--weekend);}
  .dcell b{font-family:var(--mono);font-size:12px;font-weight:600;line-height:1;}
  .dcell i{font-style:normal;font-size:8.5px;color:var(--faint);text-transform:uppercase;letter-spacing:.03em;margin-top:2px;}
  .today-flag{
    position:absolute;top:0;transform:translateX(-50%);
    background:var(--today);color:#fff;font-size:9.5px;font-weight:700;
    padding:2px 6px;border-radius:0 0 6px 6px;letter-spacing:.03em;white-space:nowrap;z-index:5;
  }

  .label{
    position:sticky;left:0;z-index:15;flex:0 0 var(--label-w);width:var(--label-w);
    background:var(--surface);border-right:1px solid var(--line2);
    display:flex;align-items:center;gap:10px;padding:10px 12px;cursor:pointer;
    transition:background .12s;
  }
  .label[data-brig="none"]{cursor:default;}
  .label:not([data-brig="none"]):hover{background:#F6F8FA;}
  .dot{width:11px;height:11px;border-radius:50%;flex:0 0 auto;box-shadow:0 0 0 3px rgba(0,0,0,.04);}
  .ltext{min-width:0;}
  .lname{font-size:13.5px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .lmeta{font-size:11px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

  .lane{
    position:relative;flex:0 0 auto;
    background-color:var(--surface);
    background-image:
      repeating-linear-gradient(to right,var(--line) 0 1px,transparent 1px var(--dw)),
      repeating-linear-gradient(to right,transparent 0 calc(5 * var(--dw)),var(--weekend) calc(5 * var(--dw)) calc(7 * var(--dw)));
  }
  .today-line{position:absolute;top:0;bottom:0;width:2px;background:var(--today);opacity:.85;z-index:4;}
  .bar{
    position:absolute;height:calc(var(--row-unit) - 14px);border-radius:8px;
    display:flex;align-items:center;gap:6px;padding:0 8px;cursor:pointer;overflow:hidden;
    background:var(--c);color:#fff;z-index:3;
    box-shadow:0 1px 2px rgba(16,24,40,.18);
    transition:transform .1s ease,box-shadow .1s ease,filter .1s ease;
  }
  .bar:hover{filter:brightness(1.05);box-shadow:0 4px 12px rgba(16,24,40,.22);z-index:6;}
  .bar:active{transform:translateY(1px);}
  .bar__name{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .bar__badge{
    margin-left:auto;font-family:var(--mono);font-size:10.5px;font-weight:600;
    background:rgba(255,255,255,.22);padding:1px 6px;border-radius:6px;white-space:nowrap;flex:0 0 auto;
  }
  .bar--planned{
    background:transparent;color:var(--c);border:1.5px dashed var(--c);
    background-image:repeating-linear-gradient(45deg,var(--cl) 0 7px,transparent 7px 14px);
    box-shadow:none;
  }
  .bar--planned .bar__badge{background:var(--cl);color:var(--c);}
  .bar--done{
    background:#EBEEF1;color:#7A828B;border:1px solid #D7DCE2;box-shadow:none;
  }
  .bar--done .bar__name{text-decoration:line-through;}
  .bar--done .bar__badge{background:rgba(0,0,0,.06);color:#7A828B;}

  /* ---------- List view ---------- */
  .list{display:none;}
  .list.on{display:block;}
  .board.off{display:none;}
  .lgroup{margin-bottom:18px;}
  .lghead{display:flex;align-items:center;gap:10px;margin:0 2px 9px;cursor:pointer;}
  .lghead .dot{width:13px;height:13px;}
  .lgname{font-size:15px;font-weight:800;letter-spacing:-.01em;}
  .lgcount{font-size:12px;color:var(--muted);font-family:var(--mono);}
  .cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(248px,1fr));gap:10px;}
  .card{
    background:var(--surface);border:1px solid var(--line);border-left:4px solid var(--c);
    border-radius:12px;padding:13px 14px;cursor:pointer;box-shadow:0 1px 2px rgba(16,24,40,.04);
    transition:box-shadow .12s,transform .04s;
  }
  .card:hover{box-shadow:var(--shadow);}
  .card:active{transform:translateY(1px);}
  .card__top{display:flex;align-items:flex-start;gap:8px;justify-content:space-between;}
  .card__name{font-size:14px;font-weight:700;line-height:1.25;}
  .tag{font-size:10.5px;font-weight:700;padding:3px 8px;border-radius:999px;white-space:nowrap;flex:0 0 auto;letter-spacing:.02em;}
  .tag--active{background:#E7F4EC;color:var(--ok);}
  .tag--planned{background:#FBEFDF;color:var(--plan);}
  .tag--done{background:#EEF1F4;color:#6B7280;}
  .card__row{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--muted);margin-top:7px;}
  .card__row .k{color:var(--faint);min-width:54px;}
  .card__row .v{color:var(--ink);font-weight:500;}
  .card__dates{font-family:var(--mono);font-size:11.5px;}

  /* ---------- Empty ---------- */
  .empty{padding:64px 24px;text-align:center;color:var(--muted);}
  .empty h3{color:var(--ink);font-size:17px;margin:0 0 6px;}
  .empty p{margin:0 0 18px;font-size:13.5px;}

  /* ---------- FAB ---------- */
  .fab{
    position:fixed;right:18px;bottom:22px;z-index:40;display:none;
    width:56px;height:56px;border-radius:50%;border:0;cursor:pointer;
    background:var(--chrome);color:#fff;font-size:26px;line-height:1;
    box-shadow:0 8px 24px rgba(16,24,40,.3);
  }

  /* ---------- Net note (offline) ---------- */
  .netnote{
    position:fixed;left:18px;bottom:22px;z-index:55;display:none;
    background:#7A1212;color:#fff;font-size:13px;font-weight:600;
    padding:10px 14px;border-radius:10px;max-width:280px;line-height:1.35;
    box-shadow:0 8px 24px rgba(16,24,40,.3);
  }
  .netnote.on{display:block;}

  /* ---------- Modal ---------- */
  .backdrop{
    position:fixed;inset:0;background:rgba(16,24,40,.45);z-index:60;
    display:none;align-items:center;justify-content:center;padding:18px;
    backdrop-filter:blur(2px);
  }
  .backdrop.on{display:flex;}
  .modal{
    background:var(--surface);border-radius:18px;width:100%;max-width:440px;
    box-shadow:0 24px 70px rgba(16,24,40,.4);max-height:92vh;overflow:auto;
    animation:pop .14s ease;
  }
  @keyframes pop{from{transform:translateY(8px) scale(.98);opacity:.6}to{transform:none;opacity:1}}
  .modal__head{padding:18px 20px 4px;}
  .modal__head h2{margin:0;font-size:17px;font-weight:800;letter-spacing:-.01em;}
  .modal__body{padding:14px 20px 6px;display:flex;flex-direction:column;gap:13px;}
  .field{display:flex;flex-direction:column;gap:6px;}
  .field label{font-size:11.5px;font-weight:700;color:var(--muted);letter-spacing:.02em;}
  .field input,.field select{
    font:inherit;font-size:14px;color:var(--ink);padding:10px 11px;
    border:1px solid var(--line2);border-radius:10px;background:#fff;width:100%;
  }
  .field input:focus,.field select:focus{outline:2px solid #2563EB;outline-offset:1px;border-color:#2563EB;}
  .field input.err{border-color:#DC2626;outline-color:#DC2626;}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:11px;}
  .stseg{display:flex;gap:6px;}
  .stseg button{
    flex:1;border:1px solid var(--line2);background:#fff;font:inherit;font-size:12.5px;font-weight:600;
    padding:9px 6px;border-radius:9px;cursor:pointer;color:var(--muted);
  }
  .stseg button.on{color:#fff;border-color:transparent;}
  .stseg button[data-st="active"].on{background:var(--ok);}
  .stseg button[data-st="planned"].on{background:var(--plan);}
  .stseg button[data-st="done"].on{background:#6B7280;}
  .swatches{display:flex;flex-wrap:wrap;gap:9px;}
  .swatch{width:30px;height:30px;border-radius:8px;cursor:pointer;border:2px solid transparent;}
  .swatch.on{border-color:var(--ink);box-shadow:0 0 0 2px #fff inset;}
  .modal__foot{
    padding:14px 20px 18px;display:flex;align-items:center;gap:8px;
    border-top:1px solid var(--line);margin-top:8px;position:sticky;bottom:0;background:var(--surface);
  }
  .modal__foot .spacer{flex:1;}

  @media (prefers-reduced-motion:reduce){
    *{animation:none !important;transition:none !important;}
  }
  @media (max-width:760px){
    :root{--label-w:124px;--dw:24px;--row-unit:38px;}
    .app{padding:14px 12px 120px;}
    .title{font-size:18px;}
    .board{max-height:calc(100vh - 280px);}
    .fab{display:flex;}
    .tools .btn--primary{display:none;}
    .legend{gap:10px;font-size:11px;}
    .backdrop{align-items:flex-end;padding:0;}
    .modal{max-width:none;border-radius:18px 18px 0 0;max-height:90vh;}
  }
</style>
</head>
<body>
<div class="app">
  <header class="topbar">
    <div class="logo">HX</div>
    <div>
      <div class="title">Доска бригад</div>
      <div class="sub">Hide-X · кто где работает и сколько осталось</div>
    </div>
  </header>

  <div class="toolbar">
    <div class="stats" id="stats"></div>
    <div class="spacer"></div>
    <div class="seg" id="viewSeg">
      <button data-view="timeline" class="on">Таймлайн</button>
      <button data-view="list">Список</button>
    </div>
    <div class="tools">
      <button class="btn btn--ghost" id="moreBtn" title="Резервная копия"><span class="icon">⤓</span></button>
      <button class="btn btn--primary" id="addBtn"><span class="icon">＋</span> Объект</button>
    </div>
  </div>

  <div class="legend">
    <span class="it"><span class="sw sw--active"></span> активный</span>
    <span class="it"><span class="sw sw--plan"></span> планируемый</span>
    <span class="it"><span class="sw sw--done"></span> завершён</span>
    <span class="it" style="color:var(--faint)">цвет полосы = бригада · нажмите на объект, чтобы изменить</span>
  </div>

  <div class="board" id="board"></div>
  <div class="list" id="list"></div>
</div>

<button class="fab" id="fab" aria-label="Добавить объект">＋</button>
<input type="file" id="importFile" accept="application/json,.json" hidden>
<div class="netnote" id="netnote" role="status" aria-live="polite">Нет связи с сервером, изменения не сохранены</div>

<!-- Object modal -->
<div class="backdrop" id="objBack">
  <div class="modal" role="dialog" aria-modal="true">
    <div class="modal__head"><h2 id="objTitle">Новый объект</h2></div>
    <div class="modal__body">
      <div class="field">
        <label for="fName">Название объекта</label>
        <input id="fName" placeholder="напр. Кровля, склад в Домодедово" autocomplete="off">
      </div>
      <div class="field">
        <label for="fAddr">Адрес / город</label>
        <input id="fAddr" placeholder="необязательно" autocomplete="off">
      </div>
      <div class="field">
        <label for="fType">Тип работ</label>
        <input id="fType" list="typeList" placeholder="напр. ППУ кровля" autocomplete="off">
        <datalist id="typeList">
          <option value="ППУ напыление кровли"></option>
          <option value="ППУ утепление стен"></option>
          <option value="Полимочевина, пол"></option>
          <option value="Полимочевина, кровля"></option>
          <option value="Гидроизоляция, полимочевина"></option>
          <option value="Полимочевина + Поропрайм"></option>
        </datalist>
      </div>
      <div class="field">
        <label for="fBrig">Бригада</label>
        <select id="fBrig"></select>
      </div>
      <div class="field" id="newBrigWrap" style="display:none">
        <label for="fNewBrig">Название новой бригады</label>
        <input id="fNewBrig" placeholder="напр. Бригада Сергея" autocomplete="off">
      </div>
      <div class="row2">
        <div class="field">
          <label for="fStart">Дата начала</label>
          <input id="fStart" type="date">
        </div>
        <div class="field">
          <label for="fDur">Длительность, дней</label>
          <input id="fDur" type="number" min="1" step="1" value="7">
        </div>
      </div>
      <div class="field">
        <label>Статус</label>
        <div class="stseg" id="stSeg">
          <button data-st="active">Активный</button>
          <button data-st="planned">Планируемый</button>
          <button data-st="done">Завершён</button>
        </div>
      </div>
    </div>
    <div class="modal__foot">
      <button class="btn btn--danger" id="objDelete" style="display:none">Удалить</button>
      <div class="spacer"></div>
      <button class="btn" id="objCancel">Отмена</button>
      <button class="btn btn--primary" id="objSave">Сохранить</button>
    </div>
  </div>
</div>

<!-- Brigade modal -->
<div class="backdrop" id="brigBack">
  <div class="modal" role="dialog" aria-modal="true" style="max-width:380px">
    <div class="modal__head"><h2>Бригада</h2></div>
    <div class="modal__body">
      <div class="field">
        <label for="bName">Название</label>
        <input id="bName" autocomplete="off">
      </div>
      <div class="field">
        <label>Цвет</label>
        <div class="swatches" id="bColors"></div>
      </div>
    </div>
    <div class="modal__foot">
      <button class="btn btn--danger" id="brigDelete">Удалить</button>
      <div class="spacer"></div>
      <button class="btn" id="brigCancel">Отмена</button>
      <button class="btn btn--primary" id="brigSave">Сохранить</button>
    </div>
  </div>
</div>

<script>
"use strict";
const API="api.php";           // серверный бэкенд хранения доски
const POLL_MS=20000;           // период автообновления (мс)
const PALETTE=["#2563EB","#15803D","#B45309","#7C3AED","#0E7490","#BE185D","#4D7C0F","#0F766E","#9333EA","#0369A1"];
const MONTHS=["Январь","Февраль","Март","Апрель","Май","Июнь","Июль","Август","Сентябрь","Октябрь","Ноябрь","Декабрь"];
const WD=["вс","пн","вт","ср","чт","пт","сб"];

/* ---------- date helpers (date-only, UTC) ---------- */
const DAY=86400000;
function pd(s){const[y,m,d]=s.split("-").map(Number);return new Date(Date.UTC(y,m-1,d));}
function iso(dt){return dt.toISOString().slice(0,10);}
function addD(dt,n){const r=new Date(dt.getTime());r.setUTCDate(r.getUTCDate()+n);return r;}
function diff(a,b){return Math.round((b.getTime()-a.getTime())/DAY);}
function todayD(){const n=new Date();return new Date(Date.UTC(n.getFullYear(),n.getMonth(),n.getDate()));}
function endD(o){return addD(pd(o.start),Math.max(1,o.duration)-1);}
function uid(){return Math.random().toString(36).slice(2,9);}
function hexA(hex,a){return hex+a;} // append alpha hex (e.g. "22")
function fmtDM(dt){const d=String(dt.getUTCDate()).padStart(2,"0");return d+"."+String(dt.getUTCMonth()+1).padStart(2,"0");}

/* ---------- state / storage ---------- */
let state={brigades:[],objects:[]};
let view="timeline";
let editingId=null;       // object being edited
let editingBrig=null;     // brigade being edited
let curStatus="planned";
let curColor=PALETTE[0];

/* server sync state */
let online=true;          // есть ли связь с сервером
let formOpen=false;       // открыта форма объекта/бригады → пауза автообновления
let saveTimer=null;       // таймер debounce
let savePending=false;    // есть незаписанная правка / идёт запись
let lastSavedJSON="";     // снимок состояния, подтверждённый сервером

function boardJSON(s){return JSON.stringify({brigades:s.brigades,objects:s.objects});}

/* индикатор «нет связи с сервером» */
function setOnline(ok){
  online=ok;
  const el=document.getElementById("netnote");
  if(el)el.classList.toggle("on",!ok);
}

/* загрузка всей доски с сервера (GET api.php) */
async function loadState(){
  try{
    const r=await fetch(API,{cache:"no-store"});
    if(!r.ok)throw 0;
    const d=await r.json();
    if(!d||!Array.isArray(d.brigades)||!Array.isArray(d.objects))throw 0;
    setOnline(true);
    return d;
  }catch(e){
    setOnline(false);
    return null;
  }
}

/* сохранение: debounce ~400 мс, затем POST всей доски целиком */
function saveState(){
  savePending=true;
  clearTimeout(saveTimer);
  saveTimer=setTimeout(flushSave,400);
  return Promise.resolve();
}
async function flushSave(){
  const body=boardJSON(state);
  try{
    const r=await fetch(API,{method:"POST",headers:{"Content-Type":"application/json"},body});
    if(!r.ok)throw 0;
    const j=await r.json();
    if(!j||!j.ok)throw 0;
    lastSavedJSON=body;
    setOnline(true);
  }catch(e){
    setOnline(false);   // данные на экране не теряем, показываем уведомление
  }finally{
    savePending=false;
  }
}

/* автообновление: тянем свежие данные, если форма закрыта и нет своих несохранённых правок */
async function refresh(){
  if(formOpen||savePending)return;
  let d;
  try{
    const r=await fetch(API,{cache:"no-store"});
    if(!r.ok)throw 0;
    d=await r.json();
    if(!d||!Array.isArray(d.brigades)||!Array.isArray(d.objects))throw 0;
    setOnline(true);
  }catch(e){
    setOnline(false);
    return;
  }
  const current=boardJSON(state);
  if(current!==lastSavedJSON)return;     // есть локальные несохранённые правки — не перетираем
  const incoming=boardJSON(d);
  if(incoming!==current){
    state=d;
    lastSavedJSON=incoming;
    render();
  }
}

/* ---------- derived ---------- */
function brigById(id){return state.brigades.find(b=>b.id===id)||null;}
function colorOf(o){const b=brigById(o.brigadeId);return b?b.color:"#8A949E";}
function remainingTxt(o){
  const r=diff(todayD(),endD(o))+1;
  if(r>0)return r+"д";
  if(r===0)return "сег";
  return "−"+(-r);
}
function setDW(){
  const w=window.innerWidth;
  const dw=w>=1000?32:w>=760?28:22;
  document.documentElement.style.setProperty("--dw",dw+"px");
  return dw;
}

/* ---------- range ---------- */
function computeRange(){
  const t=todayD();
  let min=t,max=addD(t,1);
  if(state.objects.length){
    let starts=state.objects.map(o=>pd(o.start));
    let ends=state.objects.map(o=>endD(o));
    min=new Date(Math.min(t.getTime(),...starts.map(d=>d.getTime())));
    max=new Date(Math.max(t.getTime(),...ends.map(d=>d.getTime())));
  }
  min=addD(min,-3);
  // align to Monday
  const dow=min.getUTCDay();
  min=addD(min,-(dow===0?6:dow-1));
  max=addD(max,5);
  if(diff(min,max)<56)max=addD(min,56);
  return {min,max,days:diff(min,max)+1};
}

/* ---------- lane packing ---------- */
function packLanes(objs,minD){
  const lanes=[];
  const sorted=[...objs].sort((a,b)=>pd(a.start)-pd(b.start));
  for(const o of sorted){
    const s=diff(minD,pd(o.start));
    const e=s+Math.max(1,o.duration)-1;
    let placed=false;
    for(const ln of lanes){if(ln.lastEnd<s){ln.items.push({o,s,e});ln.lastEnd=e;placed=true;break;}}
    if(!placed)lanes.push({items:[{o,s,e}],lastEnd:e});
  }
  return lanes.length?lanes:[{items:[],lastEnd:-1}];
}

/* ---------- render: stats ---------- */
function renderStats(){
  const active=state.objects.filter(o=>o.status==="active").length;
  const planned=state.objects.filter(o=>o.status==="planned").length;
  const el=document.getElementById("stats");
  el.innerHTML=
    `<span class="chip"><span class="d" style="background:var(--chrome)"></span>Бригад <b>${state.brigades.length}</b></span>`+
    `<span class="chip"><span class="d" style="background:var(--ok)"></span>Активных <b>${active}</b></span>`+
    `<span class="chip"><span class="d" style="background:var(--plan)"></span>Планируется <b>${planned}</b></span>`;
}

/* ---------- render: timeline ---------- */
function renderTimeline(){
  const board=document.getElementById("board");
  if(!state.objects.length&&!state.brigades.length){board.innerHTML=emptyHTML();return;}
  const dw=setDW();
  const {min,days}=computeRange();
  const totalW=days*dw;
  const todayOff=diff(min,todayD())*dw;

  // header bands
  let months="",groups=[],gi=-1,lastKey="";
  for(let i=0;i<days;i++){
    const d=addD(min,i),key=d.getUTCFullYear()+"-"+d.getUTCMonth();
    if(key!==lastKey){groups.push({label:MONTHS[d.getUTCMonth()]+" "+d.getUTCFullYear(),n:1});lastKey=key;gi++;}
    else groups[gi].n++;
  }
  months=groups.map(g=>`<div class="mcell" style="width:${g.n*dw}px">${g.label}</div>`).join("");
  let daysRow="";
  for(let i=0;i<days;i++){
    const d=addD(min,i),wd=d.getUTCDay(),we=(wd===0||wd===6);
    daysRow+=`<div class="dcell${we?" we":""}" style="width:${dw}px"><b>${d.getUTCDate()}</b><i>${WD[wd]}</i></div>`;
  }

  let html=
    `<div class="brow head">`+
      `<div class="corner">Бригада / объекты</div>`+
      `<div class="thead" style="width:${totalW}px">`+
        `<div class="months">${months}</div>`+
        `<div class="days">${daysRow}</div>`+
        `<div class="today-flag" style="left:${todayOff}px">Сегодня</div>`+
      `</div>`+
    `</div>`;

  // brigade lanes (+ unassigned)
  const groupsList=state.brigades.map(b=>({id:b.id,name:b.name,color:b.color,
      objs:state.objects.filter(o=>o.brigadeId===b.id)}));
  const unassigned=state.objects.filter(o=>!brigById(o.brigadeId));
  if(unassigned.length)groupsList.push({id:"none",name:"Не распределено",color:"#8A949E",objs:unassigned});

  for(const g of groupsList){
    const lanes=packLanes(g.objs,min);
    const sub=lanes.length;
    const rowUnit=parseFloat(getComputedStyle(document.documentElement).getPropertyValue("--row-unit"));
    const laneH=sub*rowUnit+8;
    let bars="";
    lanes.forEach((ln,li)=>{
      for(const it of ln.items){
        const o=it.o,c=g.color,left=it.s*dw,w=Math.max(dw,(it.e-it.s+1)*dw),top=li*rowUnit+7;
        const badge=o.status==="active"?remainingTxt(o):o.status==="planned"?"пл":"✓";
        const cls=o.status==="planned"?"bar--planned":o.status==="done"?"bar--done":"";
        const tip=`${o.name}${o.addr?" · "+o.addr:""} · ${fmtDM(pd(o.start))}–${fmtDM(endD(o))} (${o.duration} дн)`;
        bars+=`<div class="bar ${cls}" data-id="${o.id}" title="${esc(tip)}" `+
              `style="left:${left}px;width:${w}px;top:${top}px;--c:${c};--cl:${hexA(c,"22")}">`+
              `<span class="bar__name">${esc(o.name)}</span>`+
              `<span class="bar__badge">${badge}</span></div>`;
      }
    });
    const meta=g.id==="none"?`${g.objs.length} об.`:`${g.objs.length} об. · нажмите для настройки`;
    html+=
      `<div class="brow">`+
        `<div class="label" data-brig="${g.id}">`+
          `<span class="dot" style="background:${g.color}"></span>`+
          `<div class="ltext"><div class="lname">${esc(g.name)}</div><div class="lmeta">${meta}</div></div>`+
        `</div>`+
        `<div class="lane" style="width:${totalW}px;height:${laneH}px">`+
          bars+
          `<div class="today-line" style="left:${todayOff}px"></div>`+
        `</div>`+
      `</div>`;
  }
  board.innerHTML=html;
  // scroll to today
  requestAnimationFrame(()=>{board.scrollLeft=Math.max(0,todayOff-130);});
}

/* ---------- render: list ---------- */
function renderList(){
  const list=document.getElementById("list");
  if(!state.objects.length){list.innerHTML=emptyHTML();return;}
  const order=["active","planned","done"];
  const groupsList=state.brigades.map(b=>({id:b.id,name:b.name,color:b.color,
      objs:state.objects.filter(o=>o.brigadeId===b.id)}));
  const unassigned=state.objects.filter(o=>!brigById(o.brigadeId));
  if(unassigned.length)groupsList.push({id:"none",name:"Не распределено",color:"#8A949E",objs:unassigned});

  let html="";
  for(const g of groupsList){
    if(!g.objs.length&&g.id==="none")continue;
    const objs=[...g.objs].sort((a,b)=>order.indexOf(a.status)-order.indexOf(b.status)||pd(a.start)-pd(b.start));
    let cards="";
    for(const o of objs){
      const c=g.color;
      const tag=o.status==="active"?`<span class="tag tag--active">${remainingTxt(o).replace("д"," дн")}</span>`
               :o.status==="planned"?`<span class="tag tag--planned">план</span>`
               :`<span class="tag tag--done">готово</span>`;
      cards+=
        `<div class="card" data-id="${o.id}" style="--c:${c}">`+
          `<div class="card__top"><div class="card__name">${esc(o.name)}</div>${tag}</div>`+
          (o.type?`<div class="card__row"><span class="k">Работы</span><span class="v">${esc(o.type)}</span></div>`:``)+
          (o.addr?`<div class="card__row"><span class="k">Адрес</span><span class="v">${esc(o.addr)}</span></div>`:``)+
          `<div class="card__row"><span class="k">Сроки</span><span class="v card__dates">${fmtDM(pd(o.start))} – ${fmtDM(endD(o))}</span><span class="v" style="color:var(--faint)">· ${o.duration} дн</span></div>`+
        `</div>`;
    }
    if(!cards)cards=`<div style="font-size:12.5px;color:var(--faint);padding:4px 2px">Нет объектов</div>`;
    html+=
      `<div class="lgroup">`+
        `<div class="lghead" data-brig="${g.id}">`+
          `<span class="dot" style="background:${g.color}"></span>`+
          `<span class="lgname">${esc(g.name)}</span>`+
          `<span class="lgcount">${g.objs.length}</span>`+
        `</div>`+
        `<div class="cards">${cards}</div>`+
      `</div>`;
  }
  list.innerHTML=html;
}

function emptyHTML(){
  return `<div class="empty"><h3>Пока нет объектов</h3><p>Добавьте первый объект — назначьте бригаду, сроки и статус.</p>`+
         `<button class="btn btn--primary" onclick="openObj()"><span class="icon">＋</span> Добавить объект</button></div>`;
}
function esc(s){return String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}

/* ---------- master render ---------- */
function render(){
  renderStats();
  const board=document.getElementById("board"),list=document.getElementById("list");
  if(view==="timeline"){board.classList.remove("off");list.classList.remove("on");renderTimeline();}
  else{board.classList.add("off");list.classList.add("on");renderList();}
}

/* ---------- object modal ---------- */
function buildBrigOptions(sel){
  const s=document.getElementById("fBrig");
  let opts=state.brigades.map(b=>`<option value="${b.id}">${esc(b.name)}</option>`).join("");
  opts+=`<option value="">Не распределено</option>`;
  opts+=`<option value="__new">＋ Новая бригада…</option>`;
  s.innerHTML=opts;
  s.value=sel==null?"":sel;
}
function setStatus(st){
  curStatus=st;
  document.querySelectorAll("#stSeg button").forEach(b=>b.classList.toggle("on",b.dataset.st===st));
}
function openObj(id){
  editingId=id||null;
  const o=id?state.objects.find(x=>x.id===id):null;
  document.getElementById("objTitle").textContent=o?"Объект":"Новый объект";
  document.getElementById("fName").value=o?o.name:"";
  document.getElementById("fName").classList.remove("err");
  document.getElementById("fAddr").value=o?(o.addr||""):"";
  document.getElementById("fType").value=o?(o.type||""):"";
  buildBrigOptions(o?o.brigadeId:null);
  document.getElementById("newBrigWrap").style.display="none";
  document.getElementById("fNewBrig").value="";
  document.getElementById("fStart").value=o?o.start:iso(todayD());
  document.getElementById("fDur").value=o?o.duration:7;
  setStatus(o?o.status:"planned");
  document.getElementById("objDelete").style.display=o?"inline-flex":"none";
  document.getElementById("objDelete").textContent="Удалить";
  document.getElementById("objDelete").dataset.armed="";
  document.getElementById("objBack").classList.add("on");
  formOpen=true;
  setTimeout(()=>document.getElementById("fName").focus(),50);
}
function closeObj(){document.getElementById("objBack").classList.remove("on");syncFormOpen();}
async function saveObj(){
  const name=document.getElementById("fName").value.trim();
  if(!name){document.getElementById("fName").classList.add("err");return;}
  let brig=document.getElementById("fBrig").value;
  let brigadeId=null;
  if(brig==="__new"){
    const nn=document.getElementById("fNewBrig").value.trim();
    if(!nn){document.getElementById("fNewBrig").classList.add("err");return;}
    const nb={id:uid(),name:nn,color:PALETTE[state.brigades.length%PALETTE.length]};
    state.brigades.push(nb);brigadeId=nb.id;
  }else brigadeId=brig||null;
  const obj={
    id:editingId||uid(),
    name,
    addr:document.getElementById("fAddr").value.trim(),
    type:document.getElementById("fType").value.trim(),
    brigadeId,
    start:document.getElementById("fStart").value||iso(todayD()),
    duration:Math.max(1,parseInt(document.getElementById("fDur").value)||1),
    status:curStatus,
  };
  if(editingId){const i=state.objects.findIndex(x=>x.id===editingId);state.objects[i]=obj;}
  else state.objects.push(obj);
  await saveState();render();closeObj();
}
async function deleteObj(){
  const btn=document.getElementById("objDelete");
  if(btn.dataset.armed!=="1"){btn.dataset.armed="1";btn.textContent="Точно удалить?";return;}
  state.objects=state.objects.filter(x=>x.id!==editingId);
  await saveState();render();closeObj();
}

/* ---------- brigade modal ---------- */
function openBrig(id){
  editingBrig=id;
  const b=brigById(id);if(!b)return;
  curColor=b.color;
  document.getElementById("bName").value=b.name;
  document.getElementById("bName").classList.remove("err");
  const wrap=document.getElementById("bColors");
  wrap.innerHTML=PALETTE.map(c=>`<div class="swatch${c===b.color?" on":""}" data-c="${c}" style="background:${c}"></div>`).join("");
  const del=document.getElementById("brigDelete");
  del.textContent="Удалить бригаду";del.dataset.armed="";
  document.getElementById("brigBack").classList.add("on");
  formOpen=true;
}
function closeBrig(){document.getElementById("brigBack").classList.remove("on");syncFormOpen();}
function syncFormOpen(){
  formOpen=document.getElementById("objBack").classList.contains("on")
         ||document.getElementById("brigBack").classList.contains("on");
}
async function saveBrig(){
  const name=document.getElementById("bName").value.trim();
  if(!name){document.getElementById("bName").classList.add("err");return;}
  const b=brigById(editingBrig);if(b){b.name=name;b.color=curColor;}
  await saveState();render();closeBrig();
}
async function deleteBrig(){
  const btn=document.getElementById("brigDelete");
  if(btn.dataset.armed!=="1"){btn.dataset.armed="1";btn.textContent="Точно? Объекты станут «не распределено»";return;}
  state.objects.forEach(o=>{if(o.brigadeId===editingBrig)o.brigadeId=null;});
  state.brigades=state.brigades.filter(b=>b.id!==editingBrig);
  await saveState();render();closeBrig();
}

/* ---------- export / import ---------- */
function exportData(){
  const blob=new Blob([JSON.stringify(state,null,2)],{type:"application/json"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;a.download="doska-brigad-"+iso(todayD())+".json";
  document.body.appendChild(a);a.click();a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
}
function importData(file){
  const r=new FileReader();
  r.onload=async()=>{
    try{
      const d=JSON.parse(r.result);
      if(!Array.isArray(d.brigades)||!Array.isArray(d.objects))throw 0;
      state=d;await saveState();render();
    }catch(e){alert("Не удалось прочитать файл — нужен JSON, выгруженный из этой доски.");}
  };
  r.readAsText(file);
}

/* ---------- events ---------- */
function bind(){
  document.getElementById("addBtn").onclick=()=>openObj();
  document.getElementById("fab").onclick=()=>openObj();
  document.getElementById("objCancel").onclick=closeObj;
  document.getElementById("objSave").onclick=saveObj;
  document.getElementById("objDelete").onclick=deleteObj;
  document.getElementById("objBack").addEventListener("click",e=>{if(e.target.id==="objBack")closeObj();});
  document.getElementById("fName").addEventListener("input",e=>e.target.classList.remove("err"));

  document.getElementById("fBrig").onchange=e=>{
    const isNew=e.target.value==="__new";
    document.getElementById("newBrigWrap").style.display=isNew?"flex":"none";
    if(isNew)setTimeout(()=>document.getElementById("fNewBrig").focus(),30);
  };
  document.querySelectorAll("#stSeg button").forEach(b=>b.onclick=()=>setStatus(b.dataset.st));

  document.getElementById("brigCancel").onclick=closeBrig;
  document.getElementById("brigSave").onclick=saveBrig;
  document.getElementById("brigDelete").onclick=deleteBrig;
  document.getElementById("brigBack").addEventListener("click",e=>{if(e.target.id==="brigBack")closeBrig();});
  document.getElementById("bColors").addEventListener("click",e=>{
    const sw=e.target.closest(".swatch");if(!sw)return;
    curColor=sw.dataset.c;
    document.querySelectorAll("#bColors .swatch").forEach(s=>s.classList.toggle("on",s===sw));
  });

  // view toggle
  document.getElementById("viewSeg").addEventListener("click",e=>{
    const b=e.target.closest("button");if(!b)return;
    view=b.dataset.view;
    document.querySelectorAll("#viewSeg button").forEach(x=>x.classList.toggle("on",x===b));
    render();
  });

  // delegated clicks: bars, cards, labels
  document.body.addEventListener("click",e=>{
    const bar=e.target.closest(".bar");if(bar){openObj(bar.dataset.id);return;}
    const card=e.target.closest(".card");if(card){openObj(card.dataset.id);return;}
    const lab=e.target.closest("[data-brig]");
    if(lab&&lab.dataset.brig&&lab.dataset.brig!=="none"){openBrig(lab.dataset.brig);}
  });

  // export / import menu
  document.getElementById("moreBtn").onclick=()=>{
    const choice=confirm("ОК — выгрузить копию данных (JSON).\nОтмена — загрузить копию из файла.");
    if(choice)exportData();else document.getElementById("importFile").click();
  };
  document.getElementById("importFile").addEventListener("change",e=>{
    if(e.target.files[0])importData(e.target.files[0]);e.target.value="";
  });

  // esc closes
  document.addEventListener("keydown",e=>{if(e.key==="Escape"){closeObj();closeBrig();}});

  // resize re-render (debounced)
  let t;window.addEventListener("resize",()=>{clearTimeout(t);t=setTimeout(render,150);});
}

/* ---------- init ---------- */
(async function(){
  const loaded=await loadState();
  // первый запуск — пустая доска (данные переносятся импортом JSON)
  state=loaded&&Array.isArray(loaded.objects)?loaded:{brigades:[],objects:[]};
  lastSavedJSON=boardJSON(state);
  bind();
  render();
  // автообновление по таймеру и при возврате на вкладку
  setInterval(refresh,POLL_MS);
  document.addEventListener("visibilitychange",()=>{if(!document.hidden)refresh();});
})();
</script>
